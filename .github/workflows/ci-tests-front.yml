name: CI — Tests unitarios frontend

on:
  # Push a main deshabilitado por restricciones de la organización iictituloing.
  # El workflow falla por restricciones de presupuesto para el repositorio privado y uso de GitHub Actions.
  # Habilitar las siguientes dos líneas cuando GitHub Actions esté disponible para repos privados de la organización.
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencias
        working-directory: insightsweb
        run: npm install

      - name: Correr tests unitarios
        working-directory: insightsweb
        run: npm test